* { margin: 0; padding: 0; box-sizing: border-box; }
body {

}

    padding: 14px 16px;

    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    outline: none;

}

button {
    width: 100%;
    padding: 14px;

    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
}
button:hover { opacity: 0.9; }
button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
.error {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 12px;
    display: none;
}
.spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #fff;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.footer {
    margin-top: 24px;
    font-size: 11px;
    color: #555;
}
</style>

    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    if (!pwd) return;

    err.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Decrypting...';

    try {
        const salt = hexToBytes(SALT_HEX);
        const iv   = hexToBytes(IV_HEX);
        const ct   = hexToBytes(CT_HEX);

        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
            'raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']
        );
        const key = await crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt, iterations: ITERATIONS, hash: 'SHA-256' },
            keyMaterial,
            { name: 'AES-GCM', length: 256 },
            false,
            ['decrypt']
        );
        const decrypted = await crypto.subtle.decrypt(
            { name: 'AES-GCM', iv }, key, ct
        );
        const html = new TextDecoder().decode(decrypted);

        // Store credential in browser/Keychain BEFORE replacing page
        if (window.PasswordCredential) {
            try {
                const cred = new PasswordCredential({
                    id: 'xela',
                    password: pwd,
                    name: 'xd'
                });
                await navigator.credentials.store(cred);
            } catch(ce) { /* Credential API not supported or denied — continue */ }
        }

        // Also submit the form to a hidden iframe to trigger native password save prompt
        try {
            const form = document.getElementById('loginForm');
            const iframe = document.createElement('iframe');
            iframe.name = 'credSaveFrame';
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            form.target = 'credSaveFrame';
            form.action = window.location.href;
            form.method = 'GET';
            // Give the browser a moment to process the form submission for credential save
            form.submit();
            await new Promise(r => setTimeout(r, 500));
        } catch(fe) { /* Form trick failed — continue anyway */ }

        // Replace entire document with decrypted content
        document.open();
        document.write(html);
        document.close();
    } catch (e) {
        err.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Enter';
        document.getElementById('pwd').select();
    }
}
</script>
</body>
</html>
